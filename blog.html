<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — URL Slug Generator</title>
<meta name="description" content="Articles about URL slugs, SEO-friendly URLs, and best practices for creating clean web addresses.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --border: #2a2a4a;
  --text: #e0e0e0;
  --text-muted: #8888aa;
  --accent: #00d4ff;
  --accent-hover: #00b8e6;
  --accent-glow: rgba(0, 212, 255, 0.15);
  --radius: 12px;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

h1 {
  font-size: 2rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 0.25rem;
}

h1 span { color: var(--accent); }

.subtitle {
  text-align: center;
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 1.05rem;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  transition: color 0.2s;
}

.back-link:hover { color: var(--accent); }

.blog-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

@media (max-width: 600px) {
  .blog-grid { grid-template-columns: 1fr; }
}

.blog-card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.blog-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.blog-card h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  line-height: 1.4;
  color: var(--text);
}

.blog-card p {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 0.75rem;
}

.blog-card-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: var(--mono);
}

.blog-card-meta .read-time {
  color: var(--accent);
}

footer {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Generator
  </a>

  <h1><span>/</span> Blog</h1>
  <p class="subtitle">Articles about URL slugs, SEO, and web best practices</p>

  <div class="blog-grid" id="blogGrid"></div>

  <footer>URL Slug Generator — Free online tool</footer>
</div>

<script>
const BLOG_ARTICLES = [
  { slug: 'what-is-a-url-slug', title: 'What Is a URL Slug? A Complete Beginner\'s Guide', excerpt: 'Learn what a URL slug is, why it matters for SEO, and how to create clean, readable URLs that boost your search rankings.', date: '2024-12-15', readTime: '6 min read' },
  { slug: 'seo-friendly-urls-guide', title: 'How to Create SEO-Friendly URLs: The Complete Guide', excerpt: 'Master the art of creating URLs that both search engines and users love. Learn Google\'s best practices for URL structure.', date: '2024-11-28', readTime: '8 min read' },
  { slug: 'url-slug-best-practices', title: '10 URL Slug Best Practices for Better Rankings', excerpt: 'Discover the top 10 URL slug best practices that SEO experts use to improve search rankings and click-through rates.', date: '2024-11-10', readTime: '7 min read' },
  { slug: 'how-to-create-perfect-url-slug', title: 'How to Create the Perfect URL Slug (Step-by-Step)', excerpt: 'Follow this step-by-step guide to create perfect URL slugs every time. Includes practical examples and a free tool.', date: '2024-10-22', readTime: '5 min read' },
  { slug: 'url-slugs-vs-url-paths', title: 'URL Slugs vs URL Paths: What\'s the Difference?', excerpt: 'Understand the key differences between URL slugs and URL paths, and why it matters for your website\'s SEO and structure.', date: '2024-10-05', readTime: '5 min read' },
  { slug: 'common-url-slug-mistakes', title: '7 Common URL Slug Mistakes That Hurt Your SEO', excerpt: 'Avoid these 7 costly URL slug mistakes that can damage your search rankings and user experience.', date: '2024-09-18', readTime: '6 min read' }
];

const grid = document.getElementById('blogGrid');
grid.innerHTML = BLOG_ARTICLES.map(a => `
  <a href="article.html?slug=${a.slug}" class="blog-card">
    <h3>${a.title}</h3>
    <p>${a.excerpt}</p>
    <div class="blog-card-meta">
      <span>${a.date}</span>
      <span class="read-time">${a.readTime}</span>
    </div>
  </a>
`).join('');
</script>
</body>
</html>
